<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日分享</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- 顶部导航栏 -->
        <header class="bg-white rounded-lg shadow-md p-4 mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">每日分享</h1>
            <div class="flex items-center space-x-4">
                <button id="login-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    登录
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- 左侧：功能导航和群聊列表 -->
            <div class="bg-white rounded-lg shadow-md p-4">
                <!-- 功能导航 -->
                <div class="mb-6">
                    <h2 class="text-lg font-semibold mb-4">功能导航</h2>
                    <ul class="space-y-2">
                        <li>
                            <button id="nav-chat" class="w-full flex items-center p-2 rounded-lg bg-blue-100 text-blue-600 hover:bg-blue-200 transition-colors">
                                <i class="fa fa-comments mr-2"></i> 群聊
                            </button>
                        </li>
                        <li>
                            <button id="nav-images" class="w-full flex items-center p-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">
                                <i class="fa fa-picture-o mr-2"></i> 每日图片
                            </button>
                        </li>
                    </ul>
                </div>

                <!-- 群聊列表 -->
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold">群聊列表</h2>
                        <button id="create-group-btn" class="text-blue-600 hover:text-blue-800">
                            <i class="fa fa-plus"></i>
                        </button>
                    </div>
                    <ul id="group-list" class="space-y-2">
                        <!-- 群聊列表将在这里动态添加 -->
                    </ul>
                </div>
            </div>

            <!-- 右侧：内容区域 -->
            <div class="md:col-span-3">
                <!-- 群聊内容 -->
                <div id="chat-content" class="bg-white rounded-lg shadow-md p-4">
                    <div class="flex justify-between items-center mb-4">
                        <h2 id="current-group-name" class="text-lg font-semibold">选择群聊</h2>
                    </div>
                    <div id="chat-messages" class="h-96 overflow-y-auto mb-4 p-2 bg-gray-50 rounded-lg">
                        <!-- 聊天消息将在这里动态添加 -->
                    </div>
                    <div class="flex">
                        <input type="text" id="chat-input" class="flex-1 border border-gray-300 rounded-l-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="输入消息...">
                        <button id="send-btn" class="bg-blue-600 text-white px-4 py-2 rounded-r-lg hover:bg-blue-700 transition-colors">
                            <i class="fa fa-paper-plane"></i>
                        </button>
                    </div>
                </div>

                <!-- 图片内容 -->
                <div id="images-content" class="bg-white rounded-lg shadow-md p-4 hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold">每日图片</h2>
                        <input type="date" id="date-select" class="border border-gray-300 rounded-lg px-2 py-1">
                    </div>
                    <div class="mb-4">
                        <input type="file" id="image-upload" class="hidden" accept="image/*">
                        <label for="image-upload" class="block w-full bg-gray-100 border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:bg-gray-200 transition-colors">
                            <i class="fa fa-cloud-upload text-3xl text-gray-400 mb-2"></i>
                            <p class="text-gray-600">点击或拖拽上传图片</p>
                        </label>
                    </div>
                    <div id="image-gallery" class="space-y-4">
                        <!-- 图片将在这里按时间轴动态添加 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl p-6 max-w-md w-full">
            <h3 class="text-xl font-bold mb-4">登录</h3>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">用户名</label>
                <input type="text" id="username" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">密码</label>
                <input type="password" id="password" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex space-x-4 mb-4">
                <button id="login-submit" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    登录
                </button>
                <button id="close-modal" class="flex-1 border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100 transition-colors">
                    取消
                </button>
            </div>
            <div class="text-center">
                <button id="switch-to-register" class="text-blue-600 hover:text-blue-800">
                    没有账号？点击注册
                </button>
            </div>
        </div>
    </div>

    <!-- 注册模态框 -->
    <div id="register-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl p-6 max-w-md w-full">
            <h3 class="text-xl font-bold mb-4">注册</h3>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">用户名</label>
                <input type="text" id="register-username" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">密码</label>
                <input type="password" id="register-password" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">确认密码</label>
                <input type="password" id="register-confirm-password" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex space-x-4 mb-4">
                <button id="register-submit" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    注册
                </button>
                <button id="close-register-modal" class="flex-1 border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100 transition-colors">
                    取消
                </button>
            </div>
            <div class="text-center">
                <button id="switch-to-login" class="text-blue-600 hover:text-blue-800">
                    已有账号？点击登录
                </button>
            </div>
        </div>
    </div>

    <!-- 创建群聊模态框 -->
    <div id="create-group-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl p-6 max-w-md w-full">
            <h3 class="text-xl font-bold mb-4">创建群聊</h3>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">群聊名称</label>
                <input type="text" id="group-name" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">邀请用户ID（用逗号分隔）</label>
                <input type="text" id="invite-user-ids" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：1,2,3">
            </div>
            <div class="flex space-x-4">
                <button id="create-group-submit" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    创建
                </button>
                <button id="close-create-group-modal" class="flex-1 border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-100 transition-colors">
                    取消
                </button>
            </div>
        </div>
    </div>

    <!-- 通知消息 -->
    <div id="notification" class="fixed bottom-4 right-4 bg-white rounded-lg shadow-lg p-4 max-w-xs transform translate-y-20 opacity-0 transition-all duration-300">
        <div class="flex items-start">
            <div class="flex-shrink-0">
                <i class="fa fa-bell text-blue-600 text-xl"></i>
            </div>
            <div class="ml-3">
                <h4 class="text-sm font-medium text-gray-900" id="notification-title"></h4>
                <div class="mt-1 text-sm text-gray-500" id="notification-message"></div>
            </div>
            <button id="close-notification" class="ml-auto flex-shrink-0">
                <i class="fa fa-times text-gray-400 hover:text-gray-600"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
